# Helm Overrides File for HashiCorp Vault used by the system tests.
server:
  image:
    repository: "mirror.gcr.io/hashicorp/vault"
    tag: 1.21.3@sha256:eb0ba6836e8d4699b7a1e8ca70d8433f7b87dcd067e6d82dff237d3ed2600ea0
  dev:
    enabled: true
  ha:
    enabled: false
  updateStrategyType: RollingUpdate
  service:
    type: NodePort
  extraEnvironmentVars:
    VAULT_FORMAT: json
injector:
  enabled: false

