name: "Discover kafka test clients"
description: "Discover kafka test clients for system tests"

outputs:
  test_clients:
    description: "Test clients list to be used on System Tests"
    value: ${{ steps.discover.outputs.test_clients }}

runs:
  using: "composite"
  steps:
    - name: 'Check out repository'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: 'Discover Kafka Test Clients'
      working-directory: kroxylicious-systemtests
      id: discover
      shell: bash
      run: |
        client_types=$(grep -oE '^\s+[A-Z][A-Z0-9_]+' ./src/main/java/io/kroxylicious/systemtests/enums/KafkaClientType.java \
          | tr -d ' ' \
          | tr '[:upper:]' '[:lower:]' \
          | paste -sd ',')
        TEST_CLIENTS="[$(echo "$client_types" | sed 's/[^,]*/"&"/g')]"
        echo "test_clients=$TEST_CLIENTS" >> $GITHUB_OUTPUT
