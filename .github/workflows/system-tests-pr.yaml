name: System Tests for Pull-Requests

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - '**/**.md'
      - '**/**.txt'
      - '.github/**'
      - '!.github/workflows/system-tests-pr.yaml'
      - '!.github/workflows/run-system-tests.yaml'
      - '!.github/workflows/build-kroxylicious-container-images.yaml'
      - '!.github/actions/**'
      - 'kroxylicious-docs**/**'
      - 'kroxylicious-integration-test**/**'
      - 'kroxylicious-*benchmarks/**'
    branches:
      - "main"
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_images:
    uses: ./.github/workflows/build-kroxylicious-container-images.yaml

  run_system_tests:
    needs: build_images
    runs-on: ubuntu-latest
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 'Discover test clients'
        working-directory: kroxylicious-systemtests
        id: discover
        run: |
          client_types=$(grep -oE '^\s+[A-Z][A-Z0-9_]+' ./src/main/java/io/kroxylicious/systemtests/enums/KafkaClientType.java \
            | tr -d ' ' \
            | tr '[:upper:]' '[:lower:]' \
            | paste -sd ',')
          TEST_CLIENTS="[$(echo "$client_types" | sed 's/[^,]*/"&"/g')]"
          echo "test_clients=$TEST_CLIENTS" >> $GITHUB_OUTPUT
      - name: 'Set kafka client'
        id: kafkaClient
        run: |
          KAFKA_CLIENTS=${{ steps.discover.outputs.test_clients }}
          for i in "${KAFKA_CLIENTS[@]}"
          do
            echo "$i"
            if ${{ contains(github.event.pull_request.labels.*.name, '$i') }}
               echo "KAKFA_CLIENT=$i" >> "$GITHUB_ENV"
            fi
          done
      - name: 'Run system tests'
        uses: ./.github/workflows/run-system-tests.yaml
        with:
          kafkaClient: $${{ env.KAKFA_CLIENT }}
          testFortanixKMS: ${{ contains(github.event.pull_request.labels.*.name, 'kms/fortanix') && true || false }}
